name: Test setup-mq action

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Test setup-mq action
        uses: ./
        with:
          version: 'latest'
      - name: Verify mq installation
        run: |
          mq --version
          echo "# Test" | mq '.h'
